{% extends 'base_dashboard.html' %}
{% block title %}Nuevo Usuario - EPS Sura{% endblock %}
{% block page_title %}Crear Usuario{% endblock %}
{% block content %}
<div class="form-page">
    <div class="section-card" style="max-width:640px">
        <div class="card-header"><h3>Nuevo Usuario del Sistema</h3></div>
        <form method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label>Nombre *</label>
                    <input type="text" name="nombre" required>
                </div>
                <div class="form-group">
                    <label>Apellido *</label>
                    <input type="text" name="apellido" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Documento *</label>
                    <input type="text" name="documento" required>
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="text" name="telefono">
                </div>
            </div>
            <div class="form-group">
                <label>Correo electrónico *</label>
                <input type="email" name="correo" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Contraseña *</label>
                    <input type="password" name="password" required>
                </div>
                <div class="form-group">
                    <label>Rol *</label>
                    <select name="rol" id="rolSelect" onchange="toggleDoctorFields(this.value)" required>
                        <option value="paciente">Paciente</option>
                        <option value="doctor">Doctor</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>EPS</label>
                <select name="eps">
                    <option value="EPS Sura">EPS Sura</option>
                    <option value="EPS Sanitas">EPS Sanitas</option>
                    <option value="EPS Compensar">EPS Compensar</option>
                    <option value="Nueva EPS">Nueva EPS</option>
                    <option value="Otra">Otra</option>
                </select>
            </div>
            <!-- Campos solo para doctor -->
            <div id="doctorFields" style="display:none">
                <div class="form-divider">Datos del Doctor</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Especialidad</label>
                        <select name="especialidad">
                            <option value="">— Selecciona —</option>
                            {% for esp in ['Medicina General','Odontología','Cardiología','Pediatría','Dermatología','Neurología','Ginecología','Oftalmología','Traumatología','Psiquiatría'] %}
                            <option value="{{ esp }}">{{ esp }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Consultorio</label>
                        <input type="text" name="consultorio" placeholder="Ej: Cons. 101">
                    </div>
                </div>
            </div>
            <div class="form-actions">
                <a href="{{ url_for('admin_usuarios') }}" class="btn-secondary">Cancelar</a>
                <button type="submit" class="btn-primary">Crear Usuario →</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function toggleDoctorFields(rol) {
    document.getElementById('doctorFields').style.display = rol === 'doctor' ? 'block' : 'none';
}
</script>
{% endblock %}
